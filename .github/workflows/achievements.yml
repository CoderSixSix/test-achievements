name: GitHub Achievements Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Run achievements tracker
      run: |
        python3 src/achievements.py
    
    - name: Check README
      run: |
        if [ -f README.md ]; then
          echo "✓ README.md exists"
        fi
    
    - name: Check LICENSE
      run: |
        if [ -f LICENSE ]; then
          echo "✓ LICENSE exists"
        fi
    
    - name: Check CONTRIBUTING
      run: |
        if [ -f CONTRIBUTING.md ]; then
          echo "✓ CONTRIBUTING.md exists"
        fi
